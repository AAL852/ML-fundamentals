# This workflow will install Python dependencies, run tests and lint with a single version of Python
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python

name: Python application

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3
    - name: Set up Python 3.10
      uses: actions/setup-python@v3
      with:
        python-version: "3.10"
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8 pytest
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
    - name: Lint with flake8
      run: |
        # stop the build if there are Python syntax errors or undefined names
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # exit-zero treats all errors as warnings. The GitHub editor is 127 chars wide
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
    - name: Test with pytest
      run: |
        pytest
            - name: Copilot deploy
  # You may pin to the exact commit or the version.
  # uses: fuji97/aws-ecs-copilot-deploy@3135fe0b52d8853171c899493da501130c3ef004
  uses: fuji97/aws-ecs-copilot-deploy@v1.1
  with:
    # Environments to deploy
    environments: 
    # Workloads to deploy
    workloads: 
    # Bucket to upload CloudFormation template
    bucket: # optional
    # Set the deploy method (manual | automatic)
    deploy_method: # optional, default is manual

          
